AWSTemplateFormatVersion: 2010-09-09
Description: IAM roles for ECS tasks with VAEC permissions boundary

Parameters:
  ProjectName:
    Type: String
    Default: pre-prod-accumulator
    Description: Project prefix for GitHub Actions role only

Resources:

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pre-prod-accumulator-ecs-task-execution-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws-us-gov:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pre-prod-accumulator-ecs-task-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: pre-prod-accumulator-ecs-s3-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - arn:aws-us-gov:s3:::pre-prod-accumulator-glue-job
                  - arn:aws-us-gov:s3:::pre-prod-accumulator-glue-job/*

  SQLRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pre-prod-accumulator-sql-runner-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: pre-prod-accumulator-sql-s3-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - arn:aws-us-gov:s3:::pre-prod-accumulator-glue-job/*

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pre-prod-accumulator-github-actions-iam-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: pre-prod-accumulator-github-actions-vpc-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "ec2:*"
                Resource: "*"

Outputs:
  ECSTaskExecutionRoleArn:
    Value: !GetAtt ECSTaskExecutionRole.Arn

  ECSTaskRoleArn:
    Value: !GetAtt ECSTaskRole.Arn

  SQLRunnerRoleArn:
    Value: !GetAtt SQLRunnerRole.Arn

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
