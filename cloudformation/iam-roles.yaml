AWSTemplateFormatVersion: 2010-09-09
Description: IAM roles for ECS tasks with VAEC permissions boundary

Parameters:
  ProjectName:
    Type: String
    Default: projectaccumulator
    Description: Project prefix for GitHub Actions role only

Resources:

  ###############################################
  # ECS Task Execution Role (Terraform expects exact name)
  ###############################################
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-cpeload-ecs-task-execution-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws-us-gov:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ###############################################
  # ECS Task Role (Application Role)
  ###############################################
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-cpeload-ecs-task-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: project-cpeload-ecs-s3-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - arn:aws-us-gov:s3:::project-accumulator-glue-job
                  - arn:aws-us-gov:s3:::project-accumulator-glue-job/*

  ###############################################
  # SQL Runner Role
  ###############################################
  SQLRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-cpeload-sql-runner-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: project-cpeload-sql-s3-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - arn:aws-us-gov:s3:::project-accumulator-glue-job/*

  ###############################################
  # GitHub Actions Role (with full EC2/VPC permissions)
  ###############################################
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub project-${ProjectName}-github-actions-iam-role
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: project-github-actions-vpc-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "ec2:*"
                Resource: "*"

Outputs:
  ECSTaskExecutionRoleArn:
    Value: !GetAtt ECSTaskExecutionRole.Arn

  ECSTaskRoleArn:
    Value: !GetAtt ECSTaskRole.Arn

  SQLRunnerRoleArn:
    Value: !GetAtt SQLRunnerRole.Arn

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
