AWSTemplateFormatVersion: 2010-09-09
Description: IAM roles for ECS tasks with VAEC permissions boundary

Parameters:
  ProjectName:
    Type: String
    Default: dev-accumulator
    Description: Project prefix for GitHub Actions role only

Resources:

  ###############################################
  # ECS Task Execution Role
  ###############################################
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-dev-accumulator-ecs-task-execution-role
      Path: /project/
      PermissionsBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/vaec/project-admin"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws-us-gov:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

      Policies:
        - PolicyName: ecs-execution-ecr-pull
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Sid: ECRPull
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: "*"

              - Sid: CloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

              - Sid: KMSDecryptForLogs
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"

  ###############################################
  # ECS Task Role (Application Role)
  ###############################################
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-dev-accumulator-ecs-task-role
      Path: /project/
      PermissionsBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/vaec/project-admin"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: project-dev-accumulator-ecs-s3-secrets-kms
          PolicyDocument:
            Version: 2012-10-17
            Statement:

              # S3 Read Access
              - Sid: ListBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - arn:aws-us-gov:s3:::project-accumulator-glue-job

              - Sid: GetObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - arn:aws-us-gov:s3:::project-accumulator-glue-job/*

              # Secrets Manager Read
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: "*"

              # KMS Decrypt
              - Sid: KMSDecrypt
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"

              # CloudWatch Logs Write
              - Sid: CloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  ###############################################
  # SQL Runner Role
  ###############################################
  SQLRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-dev-accumulator-sql-runner-role
      Path: /project/
      PermissionsBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/vaec/project-admin"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: project-dev-accumulator-sql-s3-secrets-kms
          PolicyDocument:
            Version: 2012-10-17
            Statement:

              # S3 Read Access
              - Sid: GetObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - arn:aws-us-gov:s3:::project-accumulator-glue-job/*

              # Secrets Manager Read
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: "*"

              # KMS Decrypt
              - Sid: KMSDecrypt
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"

              # CloudWatch Logs Write
              - Sid: CloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  ###############################################
  # GitHub Actions Role
  ###############################################
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "project-${ProjectName}-github-actions-iam-role"
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: sts:AssumeRole

      Policies:
        - PolicyName: project-github-actions-vpc-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "ec2:*"
                Resource: "*"

        - PolicyName: project-github-actions-ecr-push
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"

              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                Resource: "*"

              - Sid: OptionalCreateRepo
                Effect: Allow
                Action:
                  - ecr:CreateRepository
                Resource: "*"

Outputs:
  ECSTaskExecutionRoleArn:
    Value: !GetAtt ECSTaskExecutionRole.Arn

  ECSTaskRoleArn:
    Value: !GetAtt ECSTaskRole.Arn

  SQLRunnerRoleArn:
    Value: !GetAtt SQLRunnerRole.Arn

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
