name: Build and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        working-directory: CpeLoad
        run: ./gradlew build

      - name: Copy built JAR to root
        run: |
          cp CpeLoad/build/libs/*.jar ./AccumulatorLoad-1.0.0.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accumulator-jar
          path: AccumulatorLoad-1.0.0.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: accumulator-jar
          path: .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws-us-gov:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
          aws-region: us-gov-west-1

      # TERRAFORM – ROOT DIRECTORY (matches your ls output)
      - name: Terraform Init
        working-directory: .
        run: terraform init

      - name: Terraform Apply
        working-directory: .
        run: terraform apply -auto-approve

      - name: Show Terraform outputs (debug)
        working-directory: .
        run: terraform output

      - name: Export EC2 instance ID
        working-directory: .
        run: |
          set -e
          ID=$(terraform output -raw ec2_instance_id)
          echo "Terraform ec2_instance_id = '$ID'"
          echo "EC2_INSTANCE_ID=$ID" >> $GITHUB_ENV

      - name: Debug EC2_INSTANCE_ID
        run: echo "EC2_INSTANCE_ID from env = '$EC2_INSTANCE_ID'"

      - name: Install Ansible + boto3
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-boto3 python3-botocore

      # INVENTORY – MUST MATCH site.yml hosts: cpe_app
      - name: Generate SSM inventory
        run: |
          set -e
          echo "[cpe_app]" > ansible/inventory.ini
          echo "$EC2_INSTANCE_ID" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[cpe_app:vars]" >> ansible/inventory.ini
          echo "ansible_connection=aws_ssm" >> ansible/inventory.ini
          echo "ansible_region=us-gov-west-1" >> ansible/inventory.ini

      - name: Show generated inventory.ini
        run: |
          echo "===== ansible/inventory.ini ====="
          cat ansible/inventory.ini
          echo "================================="

      - name: Show Ansible hosts for cpe_app
        run: |
          ansible -i ansible/inventory.ini cpe_app --list-hosts || true

      # THIS WILL FAIL IF:
      # - EC2_INSTANCE_ID is empty
      # - group name doesn't match
      # - db_active_active role folder is missing
      - name: Run Ansible playbook via SSM
        run: ansible-playbook -i ansible/inventory.ini ansible/site.yml
