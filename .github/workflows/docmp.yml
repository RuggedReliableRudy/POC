name: Deploy Accumulator Application

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Show Terraform outputs
        run: terraform output

  build:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build with Gradle
        working-directory: CpeLoad
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accumulator-jar
          path: CpeLoad/build/libs/*.jar

  deploy:
    needs: build
    runs-on: [self-hosted, accumulator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: accumulator-jar
          path: .

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Retrieve SSH key from Secrets Manager
        run: |
          aws secretsmanager get-secret-value \
            --secret-id arn:aws-us-gov:secretsmanager:us-gov-west-1:018743596699:secret:ansible/keypair-tLYVKr \
            --region us-gov-west-1 \
            --query SecretString \
           --output text > /tmp/ansible-key.pem
          chmod 600 /tmp/ansible-key.pem


      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (read state)
        run: terraform init

      - name: Export Terraform outputs
        run: |
          echo "DB_ENDPOINT_1=$(terraform output -raw db_endpoint_1)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_2=$(terraform output -raw db_endpoint_2)" >> $GITHUB_ENV
          echo "DB_NAME=$(terraform output -raw db_name)" >> $GITHUB_ENV
          echo "DB_PORT=$(terraform output -raw db_port)" >> $GITHUB_ENV

      - name: Debug exported values
        run: |
          echo "DB_ENDPOINT_1=$DB_ENDPOINT_1"
          echo "DB_ENDPOINT_2=$DB_ENDPOINT_2"
          echo "DB_NAME=$DB_NAME"
          echo "DB_PORT=$DB_PORT"

      - name: Run Ansible locally
        env:
          DB_ENDPOINT_1: $DB_ENDPOINT_1
          DB_ENDPOINT_2: $DB_ENDPOINT_2
          DB_NAME: $DB_NAME
          DB_PORT: $DB_PORT
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/site.yml
