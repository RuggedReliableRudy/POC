name: Deploy Accumulator Application

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Show Terraform outputs (debug)
        run: terraform output

  build:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build with Gradle
        working-directory: CpeLoad
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accumulator-jar
          path: CpeLoad/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: accumulator-jar
          path: .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (read state)
        run: terraform init

      # ============================================================
      # EXPORT TERRAFORM OUTPUTS FOR ANSIBLE
      # ============================================================
      - name: Export Terraform outputs
        run: |
          echo "EC2_INSTANCE_ID=$(terraform output -raw ec2_instance_id)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_1=$(terraform output -raw db_endpoint_1)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_2=$(terraform output -raw db_endpoint_2)" >> $GITHUB_ENV
          echo "DB_NAME=$(terraform output -raw db_name)" >> $GITHUB_ENV
          echo "DB_PORT=$(terraform output -raw db_port)" >> $GITHUB_ENV

      - name: Debug exported values
        run: |
          echo "EC2_INSTANCE_ID=$EC2_INSTANCE_ID"
          echo "DB_ENDPOINT_1=$DB_ENDPOINT_1"
          echo "DB_ENDPOINT_2=$DB_ENDPOINT_2"
          echo "DB_NAME=$DB_NAME"
          echo "DB_PORT=$DB_PORT"

      - name: Install Ansible + boto3
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-boto3 python3-botocore

      # ============================================================
      # GENERATE SSM INVENTORY
      # ============================================================
      - name: Generate SSM inventory
        run: |
          echo "[cpe_app]" > ansible/inventory.ini
          echo "$EC2_INSTANCE_ID" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[cpe_app:vars]" >> ansible/inventory.ini
          echo "ansible_connection=aws_ssm" >> ansible/inventory.ini
          echo "ansible_region=us-gov-west-1" >> ansible/inventory.ini

      - name: Show generated inventory.ini
        run: cat ansible/inventory.ini

      - name: Run Ansible playbook via SSM
        env:
          DB_ENDPOINT_1: ${{ env.DB_ENDPOINT_1 }}
          DB_ENDPOINT_2: ${{ env.DB_ENDPOINT_2 }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_PORT: ${{ env.DB_PORT }}
        run: ansible-playbook -i ansible/inventory.ini ansible/site.yml
