name: Deploy Accumulator App

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: cpeload
      AWS_REGION: us-gov-west-1

    permissions:
      id-token: write
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:latest -f docker/Dockerfile docker/

      - name: Determine image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Set ECR URI
        run: |
          echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}"
          echo "ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE_NAME}" >> $GITHUB_ENV
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_GOVCLOUD_ACCOUNT_ID }}

      - name: Debug ECR URI
        run: |
          echo "ECR_URI=${ECR_URI}"
          echo "IMAGE_TAG=${IMAGE_TAG}"

      - name: Tag image
        run: docker tag $IMAGE_NAME:latest ${ECR_URI}:${IMAGE_TAG}

      - name: Push image to ECR
        run: docker push ${ECR_URI}:${IMAGE_TAG}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var="ecr_uri=${ECR_URI}" -var="image_tag=${IMAGE_TAG}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="ecr_uri=${ECR_URI}" -var="image_tag=${IMAGE_TAG}"
