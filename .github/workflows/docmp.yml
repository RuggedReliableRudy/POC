name: Deploy Accumulator Application (SSM)

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  contents: read

jobs:

  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Show Terraform outputs
        run: terraform output


  build:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build with Gradle
        working-directory: CpeLoad
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Rename JAR for deployment
        run: |
          mv CpeLoad/build/libs/*.jar AccumulatorLoad-1.0.0.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accumulator-jar
          path: AccumulatorLoad-1.0.0.jar


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: accumulator-jar
          path: .

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (read state)
        run: terraform init

      - name: Export Terraform outputs
        run: |
          echo "EC2_INSTANCE_ID=$(terraform output -raw ec2_instance_id)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_1=$(terraform output -raw db_endpoint_1)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_2=$(terraform output -raw db_endpoint_2)" >> $GITHUB_ENV
          echo "DB_NAME=$(terraform output -raw db_name)" >> $GITHUB_ENV
          echo "DB_PORT=$(terraform output -raw db_port)" >> $GITHUB_ENV
          echo "DB_USER=accumulator" >> $GITHUB_ENV

      - name: Make deploy script executable
        run: chmod +x deploy_ssm.sh

      - name: Deploy via SSM Run Command
        run: |
          ./deploy_ssm.sh \
            "$EC2_INSTANCE_ID" \
            "project-accumulator-glue-job" \
            "AccumulatorLoad-1.0.0.jar" \
            "$DB_ENDPOINT_1" \
            "$DB_ENDPOINT_2" \
            "$DB_NAME" \
            "$DB_PORT" \
            "$DB_USER" \
            "accumulator"
