name: Deploy Multi-Region Infra

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  contents: read

jobs:
  deploy-west:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: cpeload
      AWS_REGION: us-gov-west-1

    permissions:
      id-token: write
      contents: read
      actions: write

    steps:
      # ----------------------------------------------------
      # Checkout
      # ----------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # Build Gradle Application
      # ----------------------------------------------------
      - name: Build JAR
        working-directory: Cpeload
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      # ----------------------------------------------------
      # Configure AWS Credentials
      # ----------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      # ----------------------------------------------------
      # Login to ECR
      # ----------------------------------------------------
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ----------------------------------------------------
      # Build Docker image
      # ----------------------------------------------------
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:latest -f Docker/Dockerfile Docker/

      # ----------------------------------------------------
      # Determine image tag
      # ----------------------------------------------------
      - name: Determine image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # ----------------------------------------------------
      # Set ECR URI (fixes your missing account ID issue)
      # ----------------------------------------------------
      - name: Set ECR URI
        run: |
          echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}"
          echo "ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE_NAME}" >> $GITHUB_ENV
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_GOVCLOUD_ACCOUNT_ID }}

      # ----------------------------------------------------
      # Debug ECR URI
      # ----------------------------------------------------
      - name: Debug ECR URI
        run: |
          echo "ECR_URI=${ECR_URI}"
          echo "IMAGE_TAG=${IMAGE_TAG}"

      # ----------------------------------------------------
      # Tag image
      # ----------------------------------------------------
      - name: Tag image
        run: docker tag $IMAGE_NAME:latest ${ECR_URI}:${IMAGE_TAG}

      # ----------------------------------------------------
      # Push image
      # ----------------------------------------------------
      - name: Push image
        run: docker push ${ECR_URI}:${IMAGE_TAG}

      # ----------------------------------------------------
      # Setup Terraform
      # ----------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ----------------------------------------------------
      # Terraform Init
      # ----------------------------------------------------
      - name: Terraform Init
        working-directory: project-infra/region-us-gov-west-1
        run: terraform init

      # ----------------------------------------------------
      # Terraform Plan
      # ----------------------------------------------------
      - name: Terraform Plan
        working-directory: project-infra/region-us-gov-west-1
        run: terraform plan -var="ecr_uri=${ECR_URI}" -var="image_tag=${IMAGE_TAG}"

      # ----------------------------------------------------
      # Terraform Apply
      # ----------------------------------------------------
      - name: Terraform Apply
        working-directory: project-infra/region-us-gov-west-1
        run: terraform apply -auto-approve -var="ecr_uri=${ECR_URI}" -var="image_tag=${IMAGE_TAG}"
