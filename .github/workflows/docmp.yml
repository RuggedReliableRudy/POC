name: Deploy Accumulator App

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  id-token: write        # REQUIRED for OIDC
  contents: read         # Required for checkout

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-gov-west-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export Terraform Outputs
        id: tfout
        run: |
          echo "EC2_PRIVATE_IP=$(terraform output -raw private_ip)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_1=$(terraform output -raw db_endpoint_1)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_2=$(terraform output -raw db_endpoint_2)" >> $GITHUB_ENV

  build:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build with Gradle
        run: |
          cd CpeLoad
          ./gradlew clean build


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accumulator-jar
          path: build/libs/AccumulatorLoad-1.0.0.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: accumulator-jar

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Add EC2 host to inventory
        run: |
          echo "[accumulator]" > inventory
          echo "${{ env.EC2_PRIVATE_IP }}" >> inventory

      - name: Copy SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i inventory ansible/deploy.yml \
            --private-key key.pem \
            --user ec2-user
