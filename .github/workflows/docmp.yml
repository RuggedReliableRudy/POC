deploy:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform -chdir=terraform init

    - name: Terraform Output EC2 IP
      id: tf-ip
      run: |
        echo "EC2_IP=$(terraform -chdir=terraform output -raw app_ec2_private_ip)" >> $GITHUB_ENV

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: cpe-jar
        path: ./ansible

    - name: Install Ansible
      run: |
        python -m pip install --upgrade pip
        pip install ansible

    - name: Prepare inventory
      working-directory: ansible
      run: |
        echo "[cpe_app]" > inventory.ini
        echo "cpe-app-ec2 ansible_host=${EC2_IP} ansible_user=ec2-user" >> inventory.ini

    - name: Run Ansible playbook
      working-directory: ansible
      env:
        CPE_DB_NODE1: ${{ secrets.CPE_DB_NODE1 }}
        CPE_DB_NODE2: ${{ secrets.CPE_DB_NODE2 }}
      run: |
        ansible-playbook -i inventory.ini site.yml \
          --extra-vars "jar_name=Cpe.1.0.0jar"
