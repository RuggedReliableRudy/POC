name: Deploy Accumulator Application

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  id-token: write        # REQUIRED for OIDC
  contents: read         # Required for checkout

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: .
        run: terraform init

      - name: Terraform Apply
        working-directory: .
        run: terraform apply -auto-approve

      - name: Show Terraform outputs (debug)
        working-directory: .
        run: terraform output

  build:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build with Gradle
        working-directory: CpeLoad
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accumulator-jar
          path: CpeLoad/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: accumulator-jar
          path: .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (read state)
        working-directory: .
        run: terraform init

      - name: Export EC2 instance ID
        working-directory: .
        run: |
          set -e
          ID=$(terraform output -raw ec2_instance_id)
          echo "Terraform ec2_instance_id = '$ID'"
          echo "EC2_INSTANCE_ID=$ID" >> $GITHUB_ENV

      - name: Debug EC2_INSTANCE_ID
        run: echo "EC2_INSTANCE_ID from env = '$EC2_INSTANCE_ID'"

      - name: Install Ansible + boto3
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-boto3 python3-botocore

      - name: Generate SSM inventory
        run: |
          set -e
          echo "[cpe_app]" > ansible/inventory.ini
          echo "$EC2_INSTANCE_ID" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[cpe_app:vars]" >> ansible/inventory.ini
          echo "ansible_connection=aws_ssm" >> ansible/inventory.ini
          echo "ansible_region=us-gov-west-1" >> ansible/inventory.ini

      - name: Show generated inventory.ini
        run: |
          echo "===== ansible/inventory.ini ====="
          cat ansible/inventory.ini
          echo "================================="

      - name: Show Ansible hosts for cpe_app
        run: |
          ansible -i ansible/inventory.ini cpe_app --list-hosts || true

      - name: Run Ansible playbook via SSM
        run: ansible-playbook -i ansible/inventory.ini ansible/site.yml
