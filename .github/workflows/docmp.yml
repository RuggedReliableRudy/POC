name: Multi-Region ECS Deployment

on:
  push:
    branches: [ main ]

env:
  APP_NAME: accumulator-load
  ENV: dev

jobs:
  deploy-east:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-gov-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          IMAGE_NAME: ${{ steps.get_ecr_uri.outputs.image_uri }}
        run: |
          docker buildx build \
            --load \
            -t $IMAGE_NAME \
            -f docker/Dockerfile \
            .


      - name: Update ECS task definition
        run: |
          REPO="${APP_NAME}-${ENV}"
          URI=$(aws ecr describe-repositories \
            --repository-names "$REPO" \
            --query 'repositories[0].repositoryUri' \
            --output text)

          FAMILY="${APP_NAME}-${ENV}"
          TASK=$(aws ecs describe-task-definition --task-definition "$FAMILY")
          NEW=$(echo "$TASK" \
            | jq --arg IMG "$URI:${{ github.sha }}" \
              '.taskDefinition
              | .containerDefinitions[0].image = $IMG
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities)')
          echo "$NEW" > new.json
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "${APP_NAME}-${ENV}-cluster" \
            --service "${APP_NAME}-${ENV}-svc" \
            --task-definition "$ARN"

  deploy-west:
    needs: deploy-east
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-gov-west-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          IMAGE_NAME: ${{ steps.get_ecr_uri.outputs.image_uri }}
        run: |
          docker buildx build \
            --load \
            -t $IMAGE_NAME \
            -f docker/Dockerfile \
            .


      - name: Update ECS task definition
        run: |
          REPO="${APP_NAME}-${ENV}"
          URI=$(aws ecr describe-repositories \
            --repository-names "$REPO" \
            --query 'repositories[0].repositoryUri' \
            --output text)

          FAMILY="${APP_NAME}-${ENV}"
          TASK=$(aws ecs describe-task-definition --task-definition "$FAMILY")
          NEW=$(echo "$TASK" \
            | jq --arg IMG "$URI:${{ github.sha }}" \
              '.taskDefinition
              | .containerDefinitions[0].image = $IMG
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities)')
          echo "$NEW" > new.json
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "${APP_NAME}-${ENV}-cluster" \
            --service "${APP_NAME}-${ENV}-svc" \
            --task-definition "$ARN"
