name: Deploy Accumulator Application

on:
  push:
    branches: [ "Accumulator-dev" ]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Show Terraform outputs
        run: terraform output


  build:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build with Gradle
        working-directory: CpeLoad
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accumulator-jar
          path: CpeLoad/build/libs/*.jar


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: accumulator-jar
          path: .

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}
          aws-region: us-gov-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Install Ansible + AWS SSM dependencies
        run: |
          sudo apt-get update
          sudo apt-get remove -y ansible || true

          sudo apt-get install -y python3 python3-pip python3-venv
          pip3 install --upgrade pip setuptools wheel

          pip3 install "ansible>=2.15" boto3 botocore

          echo "$HOME/.local/bin" >> $GITHUB_PATH

          ansible-galaxy collection install amazon.aws
          ansible-galaxy collection install community.aws

          which ansible
          ansible --version

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (read state)
        run: terraform init

      - name: Export Terraform outputs
        run: |
          echo "EC2_INSTANCE_ID=$(terraform output -raw ec2_instance_id)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_1=$(terraform output -raw db_endpoint_1)" >> $GITHUB_ENV
          echo "DB_ENDPOINT_2=$(terraform output -raw db_endpoint_2)" >> $GITHUB_ENV
          echo "DB_NAME=$(terraform output -raw db_name)" >> $GITHUB_ENV
          echo "DB_PORT=$(terraform output -raw db_port)" >> $GITHUB_ENV

      - name: Debug exported values
        run: |
          echo "EC2_INSTANCE_ID=$EC2_INSTANCE_ID"
          echo "DB_ENDPOINT_1=$DB_ENDPOINT_1"
          echo "DB_ENDPOINT_2=$DB_ENDPOINT_2"
          echo "DB_NAME=$DB_NAME"
          echo "DB_PORT=$DB_PORT"

      # 🔥 TEST SSM CONNECTION BEFORE RUNNING PLAYBOOK
      - name: Test SSM connection to EC2
        env:
          EC2_INSTANCE_ID: ${{ env.EC2_INSTANCE_ID }}
        run: |
          export ANSIBLE_COLLECTIONS_PATHS=~/.ansible/collections:/usr/share/ansible/collections

          echo "Testing SSM connectivity to $EC2_INSTANCE_ID"

          ansible -i "${EC2_INSTANCE_ID}," all \
            -e "ansible_connection=aws_ssm" \
            -m ping -vvv

      # 🔥 INSTALL PYTHON ON EC2 BEFORE FACT GATHERING
      - name: Install Python on EC2 (required for Ansible facts)
        env:
          EC2_INSTANCE_ID: ${{ env.EC2_INSTANCE_ID }}
        run: |
          export ANSIBLE_COLLECTIONS_PATHS=~/.ansible/collections:/usr/share/ansible/collections

          ansible -i "${EC2_INSTANCE_ID}," all \
            -e "ansible_connection=aws_ssm" \
            -m raw \
            -a "sudo yum install -y python3 || sudo dnf install -y python3 || sudo apt-get install -y python3"

      # 🔥 RUN THE REAL PLAYBOOK
      - name: Run Ansible via SSM
        env:
          EC2_INSTANCE_ID: ${{ env.EC2_INSTANCE_ID }}
          DB_ENDPOINT_1: ${{ env.DB_ENDPOINT_1 }}
          DB_ENDPOINT_2: ${{ env.DB_ENDPOINT_2 }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_PORT: ${{ env.DB_PORT }}
        run: |
          export ANSIBLE_COLLECTIONS_PATHS=~/.ansible/collections:/usr/share/ansible/collections

          ansible-playbook \
            -i "${EC2_INSTANCE_ID}," \
            ansible/site.yml
