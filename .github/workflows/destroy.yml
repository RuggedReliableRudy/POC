name: Destroy CpeLoad Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type YES to confirm destroying ALL infrastructure"
        required: true
        type: string

env:
  AWS_REGION: us-gov-west-1

jobs:
  destroy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      actions: write

    steps:
      # ----------------------------------------------------
      # Safety Check
      # ----------------------------------------------------
      - name: Validate destroy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "YES" ]; then
            echo "❌ Destroy cancelled — you must type YES to confirm."
            exit 1
          fi
          echo "✔ Destroy confirmed."

      # ----------------------------------------------------
      # Checkout source code
      # ----------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # Configure AWS credentials
      # ----------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_ROLE_ARN }}

      # ----------------------------------------------------
      # Setup Terraform
      # ----------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # ----------------------------------------------------
      # Terraform Destroy
      # ----------------------------------------------------
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var-file="terraform.tfvars"
