AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions IAM Role for Terraform provisioning

Resources:

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-dev-docmp-github-actions-iam-role
      Path: /project/
      PermissionsBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/vaec/project-admin"

      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: "arn:aws-us-gov:iam::018743596699:oidc-provider/token.actions.va.ghe.com"
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
              StringLike:
                token.actions.githubusercontent.com:sub: "repo:software/project-accumulator:*"

      Policies:

        # ---------------------------------------------------------
        # S3 Backend Access
        # ---------------------------------------------------------
        - PolicyName: github-actions-terraform-s3-backend
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: arn:aws-us-gov:s3:::project-accumulator-statefile

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws-us-gov:s3:::project-accumulator-statefile/*

        # ---------------------------------------------------------
        # Terraform Provisioning Permissions
        # ---------------------------------------------------------
        - PolicyName: github-actions-terraform-provisioning
          PolicyDocument:
            Version: 2012-10-17
            Statement:

              # EC2 + RDS provisioning
              - Effect: Allow
                Action:
                  - ec2:*
                  - rds:*
                Resource: "*"

              # Allow Terraform to pass IAM roles
              - Effect: Allow
                Action: iam:PassRole
                Resource: arn:aws-us-gov:iam::018743596699:role/project/*

              # Secrets Manager access
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:ListSecrets
                  - secretsmanager:ListSecretVersionIds
                Resource: "*"

              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"

        # ---------------------------------------------------------
        # FULL KMS PERMISSIONS (ALL REQUIRED FOR TERRAFORM)
        # ---------------------------------------------------------
        - PolicyName: github-actions-kms-full
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kms:CreateKey
                  - kms:ScheduleKeyDeletion
                  - kms:PutKeyPolicy
                  - kms:GetKeyPolicy
                  - kms:EnableKeyRotation
                  - kms:GetKeyRotationStatus
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:ListAliases
                  - kms:TagResource
                  - kms:UntagResource
                  - kms:ListResourceTags
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:GenerateDataKeyWithoutPlaintext
                  - kms:GenerateDataKeyPair
                  - kms:GenerateDataKeyPairWithoutPlaintext
                  - kms:DescribeKey
                  - kms:ListKeys
                Resource: "*"

        # ---------------------------------------------------------
        # ⭐ NEW: SSM SESSION MANAGER PERMISSIONS FOR GITHUB ACTIONS
        # ---------------------------------------------------------
        - PolicyName: github-actions-ssm-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartSession
                  - ssm:DescribeSessions
                  - ssm:TerminateSession
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:DescribeInstanceInformation
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                  - ec2messages:GetMessages
                  - ec2messages:SendReply
                Resource: "*"
