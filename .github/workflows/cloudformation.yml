AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions IAM Role for Terraform provisioning + SSM deployments

Resources:

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-dev-docmp-github-actions-iam-role
      Path: /project/
      PermissionsBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/vaec/project-admin"

      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: "arn:aws-us-gov:iam::018743596699:oidc-provider/token.actions.va.ghe.com"
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
              StringLike:
                token.actions.githubusercontent.com:sub: "repo:software/project-accumulator:*"

      Policies:

        # (EXISTING POLICIES REMAIN UNCHANGED)
        # ---------------------------------------------------------
        # S3 Backend Access
        # Deployment Bucket Access
        # Terraform Provisioning Permissions
        # KMS Permissions
        # SSM Permissions
        # ---------------------------------------------------------

        # =========================================================
        # ⭐ NEW: MSK (Kafka) Provisioning Permissions
        # =========================================================
        - PolicyName: github-actions-msk-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kafka:*
                  - kafka-cluster:*
                  - kafka:GetBootstrapBrokers
                  - kafka:ListClusters
                  - kafka:DescribeCluster
                  - kafka:CreateCluster
                  - kafka:DeleteCluster
                Resource: "*"

              # MSK requires VPC networking permissions
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # ⭐ NEW: Redis (ElastiCache Global Datastore) Permissions
        # =========================================================
        - PolicyName: github-actions-redis-global-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:*
                  - elasticache:CreateGlobalReplicationGroup
                  - elasticache:DeleteGlobalReplicationGroup
                  - elasticache:CreateReplicationGroup
                  - elasticache:ModifyReplicationGroup
                  - elasticache:DescribeReplicationGroups
                  - elasticache:DescribeGlobalReplicationGroups
                  - elasticache:CreateCacheSubnetGroup
                  - elasticache:DescribeCacheSubnetGroups
                Resource: "*"

              # Redis also requires VPC networking permissions
              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # ⭐ NEW: Global Load Balancer (Route 53 + ALB) Permissions
        # =========================================================
        - PolicyName: github-actions-global-loadbalancer
          PolicyDocument:
            Version: 2012-10-17
            Statement:

              # Route 53 (latency-based routing)
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:ListHostedZones
                  - route53:ListResourceRecordSets
                  - route53:GetHostedZone
                Resource: "*"

              # ALB provisioning
              - Effect: Allow
                Action:
                  - elasticloadbalancing:*
                Resource: "*"

              # Health checks for global routing
              - Effect: Allow
                Action:
                  - route53:CreateHealthCheck
                  - route53:UpdateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:GetHealthCheck
                Resource: "*"

              # VPC networking for ALB
              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"
