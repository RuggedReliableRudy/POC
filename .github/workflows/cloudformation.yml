AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions IAM Role for Terraform provisioning + SSM deployments

Resources:

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-dev-docmp-github-actions-iam-role
      Path: /project/
      PermissionsBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/vaec/project-admin"

      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: "arn:aws-us-gov:iam::018743596699:oidc-provider/token.actions.va.ghe.com"
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
              StringLike:
                token.actions.githubusercontent.com:sub: "repo:software/project-accumulator:*"

      Policies:

        # =========================================================
        # ⭐ S3 Backend + Deployment Bucket Access
        # =========================================================
        - PolicyName: github-actions-s3-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: "*"

        # =========================================================
        # ⭐ Terraform Provisioning Permissions
        # =========================================================
        - PolicyName: github-actions-terraform-provisioning
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ec2:*
                  - iam:*
                  - kms:*
                  - logs:*
                  - autoscaling:*
                  - cloudwatch:*
                Resource: "*"

        # =========================================================
        # ⭐ KMS Permissions
        # =========================================================
        - PolicyName: github-actions-kms-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: "*"

        # =========================================================
        # ⭐ SSM Permissions
        # =========================================================
        - PolicyName: github-actions-ssm-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParameterHistory
                  - ssm:PutParameter
                Resource: "*"

        # =========================================================
        # ⭐ MSK (Kafka) Provisioning Permissions
        # =========================================================
        - PolicyName: github-actions-msk-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kafka:*
                  - kafka-cluster:*
                  - kafka:GetBootstrapBrokers
                  - kafka:ListClusters
                  - kafka:DescribeCluster
                  - kafka:CreateCluster
                  - kafka:DeleteCluster
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # ⭐ Redis (ElastiCache Global Datastore) Permissions
        # =========================================================
        - PolicyName: github-actions-redis-global-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:*
                  - elasticache:CreateGlobalReplicationGroup
                  - elasticache:DeleteGlobalReplicationGroup
                  - elasticache:CreateReplicationGroup
                  - elasticache:ModifyReplicationGroup
                  - elasticache:DescribeReplicationGroups
                  - elasticache:DescribeGlobalReplicationGroups
                  - elasticache:CreateCacheSubnetGroup
                  - elasticache:DescribeCacheSubnetGroups
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # ⭐ Global Load Balancer (Route 53 + ALB) Permissions
        # =========================================================
        - PolicyName: github-actions-global-loadbalancer
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:ListHostedZones
                  - route53:ListResourceRecordSets
                  - route53:GetHostedZone
                Resource: "*"

              - Effect: Allow
                Action:
                  - elasticloadbalancing:*
                Resource: "*"

              - Effect: Allow
                Action:
                  - route53:CreateHealthCheck
                  - route53:UpdateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:GetHealthCheck
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # ⭐ ECS + ECR Permissions for Deployments
        # =========================================================
        - PolicyName: github-actions-ecs-ecr-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:

              # --- ECR: Push, Pull, Authenticate ---
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:CreateRepository
                  - ecr:DescribeRepositories
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: "*"

              # --- ECS: Deploy, Update Services, Register Task Definitions ---
              - Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:DescribeClusters
                  - ecs:ListClusters
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:UpdateService
                  - ecs:CreateService
                  - ecs:DescribeServices
                  - ecs:ListServices
                  - ecs:DeleteService
                  - ecs:RunTask
                  - ecs:StopTask
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                Resource: "*"

              # --- IAM PassRole for ECS Task Execution Role ---
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "arn:aws-us-gov:iam::${AWS::AccountId}:role/*"
                Condition:
                  StringLike:
                    iam:PassedToService:
                      - ecs.amazonaws.com
                      - ecs-tasks.amazonaws.com

              # --- VPC Networking for ECS Tasks ---
              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeNetworkInterfaces
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                Resource: "*"

              # --- Load Balancer Integration for ECS Services ---
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyListener
                Resource: "*"
