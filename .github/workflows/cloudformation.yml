AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions IAM Role for Terraform provisioning

Resources:

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: project-dev-docmp-github-actions-iam-role
      Path: /project/
      PermissionsBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/vaec/project-admin"

      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: "arn:aws-us-gov:iam::018743596699:oidc-provider/token.actions.va.ghe.com"
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
              StringLike:
                token.actions.githubusercontent.com:sub: "repo:software/project-accumulator:*"

      Policies:

        # =========================================================
        # S3 Backend Access
        # =========================================================
        - PolicyName: github-actions-terraform-s3-backend
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: arn:aws-us-gov:s3:::project-accumulator-statefile

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws-us-gov:s3:::project-accumulator-statefile/*

        # =========================================================
        # Deployment Bucket Access
        # =========================================================
        - PolicyName: github-actions-deploy-bucket
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: arn:aws-us-gov:s3:::project-accumulator-glue-job

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws-us-gov:s3:::project-accumulator-glue-job/*

        # =========================================================
        # Terraform Provisioning Permissions
        # =========================================================
        - PolicyName: github-actions-terraform-provisioning
          PolicyDocument:
            Version: 2012-10-17
            Statement:

              # EC2 + RDS provisioning
              - Effect: Allow
                Action:
                  - ec2:*
                  - rds:*
                Resource: "*"

              # IAM PassRole
              - Effect: Allow
                Action: iam:PassRole
                Resource: arn:aws-us-gov:iam::018743596699:role/project/*

              # KMS permissions
              - Effect: Allow
                Action:
                  - kms:CreateKey
                  - kms:ScheduleKeyDeletion
                  - kms:PutKeyPolicy
                  - kms:GetKeyPolicy
                  - kms:EnableKeyRotation
                  - kms:GetKeyRotationStatus
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:ListAliases
                  - kms:TagResource
                  - kms:UntagResource
                  - kms:ListResourceTags
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:GenerateDataKeyWithoutPlaintext
                  - kms:GenerateDataKeyPair
                  - kms:GenerateDataKeyPairWithoutPlaintext
                  - kms:DescribeKey
                  - kms:ListKeys
                Resource: "*"

              # SSM permissions
              - Effect: Allow
                Action:
                  - ssm:StartSession
                  - ssm:DescribeSessions
                  - ssm:TerminateSession
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:DescribeInstanceInformation
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                  - ec2messages:GetMessages
                  - ec2messages:SendReply
                Resource: "*"

              # Secrets Manager
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:ListSecrets
                  - secretsmanager:ListSecretVersionIds
                Resource: "*"

              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"

        # =========================================================
        # MSK (Kafka) Permissions
        # =========================================================
        - PolicyName: github-actions-msk-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kafka:*
                  - kafka-cluster:*
                  - kafka:GetBootstrapBrokers
                  - kafka:ListClusters
                  - kafka:DescribeCluster
                  - kafka:CreateCluster
                  - kafka:DeleteCluster
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # Redis (ElastiCache Global Datastore)
        # =========================================================
        - PolicyName: github-actions-redis-global-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:*
                  - elasticache:CreateGlobalReplicationGroup
                  - elasticache:DeleteGlobalReplicationGroup
                  - elasticache:CreateReplicationGroup
                  - elasticache:ModifyReplicationGroup
                  - elasticache:DescribeReplicationGroups
                  - elasticache:DescribeGlobalReplicationGroups
                  - elasticache:CreateCacheSubnetGroup
                  - elasticache:DescribeCacheSubnetGroups
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # Global Load Balancer (Route 53 + ALB)
        # =========================================================
        - PolicyName: github-actions-global-loadbalancer
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:ListHostedZones
                  - route53:ListResourceRecordSets
                  - route53:GetHostedZone
                Resource: "*"

              - Effect: Allow
                Action: elasticloadbalancing:*
                Resource: "*"

              - Effect: Allow
                Action:
                  - route53:CreateHealthCheck
                  - route53:UpdateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:GetHealthCheck
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

        # =========================================================
        # ECS + ECR Permissions for Deployments
        # =========================================================
        - PolicyName: github-actions-ecs-ecr-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:

              # ECR
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:CreateRepository
                  - ecr:DescribeRepositories
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: "*"

              # ECS
              - Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:DescribeClusters
                  - ecs:ListClusters
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:UpdateService
                  - ecs:CreateService
                  - ecs:DescribeServices
                  - ecs:ListServices
                  - ecs:DeleteService
                  - ecs:RunTask
                  - ecs:StopTask
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                Resource: "*"

              # IAM PassRole
              - Effect: Allow
                Action: iam:PassRole
                Resource: "arn:aws-us-gov:iam::${AWS::AccountId}:role/*"
                Condition:
                  StringLike:
                    iam:PassedToService:
                      - ecs.amazonaws.com
                      - ecs-tasks.amazonaws.com

              # VPC Networking
              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeNetworkInterfaces
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                Resource: "*"

              # Load Balancer Integration
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyListener
                Resource: "*"
