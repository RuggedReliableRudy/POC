  ###############################################
  # GitHub Actions Role (Updated for OIDC + Terraform)
  ###############################################
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "project-${ProjectName}-github-actions-iam-role"
      Path: /project/
      PermissionsBoundary: arn:aws-us-gov:iam::018743596699:policy/vaec/vaec-administrator

      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !Sub "arn:aws-us-gov:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
              StringLike:
                token.actions.githubusercontent.com:sub: "repo:YOUR_GITHUB_ORG/YOUR_REPO:*"

      Policies:
        - PolicyName: github-actions-terraform-s3-backend
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              # S3 backend bucket access
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: "arn:aws-us-gov:s3:::project-accumulator-statefile"

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: "arn:aws-us-gov:s3:::project-accumulator-statefile/*"

        - PolicyName: github-actions-terraform-ec2-rds-kms
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              # EC2 provisioning
              - Effect: Allow
                Action: "ec2:*"
                Resource: "*"

              # RDS provisioning
              - Effect: Allow
                Action: "rds:*"
                Resource: "*"

              # IAM PassRole for EC2 instance profile
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "arn:aws-us-gov:iam::*:role/project/*"

              # KMS usage for RDS encryption
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey*
                  - kms:DescribeKey
                Resource: "*"

              # Secrets Manager (for DB password)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: "*"

              # CloudWatch Logs (Terraform debugging)
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
