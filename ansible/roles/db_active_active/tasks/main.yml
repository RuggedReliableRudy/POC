---
# ============================================================
# Install required tools
# ============================================================
- name: Ensure PostgreSQL client and tools are installed
  yum:
    name:
      - postgresql15
      - jq
      - awscli
    state: present

# ============================================================
# Retrieve DB password from Secrets Manager
# ============================================================
- name: Get DB secret from Secrets Manager
  shell: |
    aws secretsmanager get-secret-value \
      --region us-gov-west-1 \
      --secret-id "{{ secret_name }}" \
      --query SecretString \
      --output text
  register: secret_raw
  changed_when: false

- name: Parse DB password from secret JSON
  set_fact:
    db_password: "{{ (secret_raw.stdout | from_json).password }}"

# ============================================================
# NODE 1 — Create DB + User
# ============================================================
- name: Create database on Node 1
  command: >
    psql "host={{ db_node1_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "CREATE DATABASE {{ db_name }};"
  environment:
    PGPASSWORD: "{{ db_password }}"
  ignore_errors: yes

- name: Create user on Node 1
  command: >
    psql "host={{ db_node1_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}' LOGIN;"
  environment:
    PGPASSWORD: "{{ db_password }}"
  ignore_errors: yes

- name: Grant replication + superuser on Node 1
  command: >
    psql "host={{ db_node1_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "GRANT rds_replication, rds_superuser TO {{ db_user }};"
  environment:
    PGPASSWORD: "{{ db_password }}"

- name: Assign ownership on Node 1
  command: >
    psql "host={{ db_node1_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "ALTER DATABASE {{ db_name }} OWNER TO {{ db_user }};"
  environment:
    PGPASSWORD: "{{ db_password }}"

# ============================================================
# NODE 1 — Enable pgactive
# ============================================================
- name: Enable pgactive on Node 1
  command: >
    psql "host={{ db_node1_endpoint }} port=5432 dbname={{ db_name }} user={{ db_user }}"
    -c "CREATE EXTENSION IF NOT EXISTS pgactive;"
  environment:
    PGPASSWORD: "{{ db_password }}"

# ============================================================
# NODE 2 — Create DB + User
# ============================================================
- name: Create database on Node 2
  command: >
    psql "host={{ db_node2_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "CREATE DATABASE {{ db_name }};"
  environment:
    PGPASSWORD: "{{ db_password }}"
  ignore_errors: yes

- name: Create user on Node 2
  command: >
    psql "host={{ db_node2_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}' LOGIN;"
  environment:
    PGPASSWORD: "{{ db_password }}"
  ignore_errors: yes

- name: Grant replication + superuser on Node 2
  command: >
    psql "host={{ db_node2_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "GRANT rds_replication, rds_superuser TO {{ db_user }};"
  environment:
    PGPASSWORD: "{{ db_password }}"

- name: Assign ownership on Node 2
  command: >
    psql "host={{ db_node2_endpoint }} port=5432 dbname=postgres user=postgres"
    -c "ALTER DATABASE {{ db_name }} OWNER TO {{ db_user }};"
  environment:
    PGPASSWORD: "{{ db_password }}"

# ============================================================
# NODE 2 — Enable pgactive
# ============================================================
- name: Enable pgactive on Node 2
  command: >
    psql "host={{ db_node2_endpoint }} port=5432 dbname={{ db_name }} user={{ db_user }}"
    -c "CREATE EXTENSION IF NOT EXISTS pgactive;"
  environment:
    PGPASSWORD: "{{ db_password }}"

# ============================================================
# NODE 1 — Create replication group
# ============================================================
- name: Create pgactive group on Node 1
  command: >
    psql "host={{ db_node1_endpoint }} port=5432 dbname={{ db_name }} user={{ db_user }}"
    -c "SELECT pgactive.pgactive_create_group(
          node_name := '{{ db_name }}-endpoint1-app',
          node_dsn := 'host={{ db_node1_endpoint }} dbname={{ db_name }} port=5432 user={{ db_user }} password={{ db_password }}'
        );"
  environment:
    PGPASSWORD: "{{ db_password }}"
  ignore_errors: yes

# ============================================================
# NODE 2 — Join replication group
# ============================================================
- name: Join pgactive group on Node 2
  command: >
    psql "host={{ db_node2_endpoint }} port=5432 dbname={{ db_name }} user={{ db_user }}"
    -c "SELECT pgactive.pgactive_join_group(
          node_name := '{{ db_name }}-endpoint2-app',
          node_dsn := 'host={{ db_node2_endpoint }} dbname={{ db_name }} port=5432 user={{ db_user }} password={{ db_password }}',
          join_using_dsn := 'host={{ db_node1_endpoint }} dbname={{ db_name }} port=5432 user={{ db_user }} password={{ db_password }}'
        );"
  environment:
    PGPASSWORD: "{{ db_password }}"
  ignore_errors: yes

