---
# ============================================================
# Ensure application directory exists
# ============================================================
- name: Ensure application directory exists
  file:
    path: /opt/cpe-app
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

# ============================================================
# Copy JAR from CI artifact
# ============================================================
- name: Copy JAR from CI artifact location
  copy:
    src: "AccumulatorLoad-1.0.0.jar"
    dest: "/opt/cpe-app/AccumulatorLoad-1.0.0.jar"
    owner: ec2-user
    group: ec2-user
    mode: "0755"

# ============================================================
# Create application DB configuration file
# ============================================================
- name: Create DB configuration file for application
  copy:
    dest: /opt/cpe-app/db.properties
    owner: ec2-user
    group: ec2-user
    mode: "0600"
    content: |
      db.primary.host={{ db_endpoint_1 }}
      db.secondary.host={{ db_endpoint_2 }}
      db.port={{ db_port }}
      db.name={{ db_name }}
      db.user={{ db_user }}
      db.password={{ db_password }}

# ============================================================
# Create systemd service for Accumulator App
# ============================================================
- name: Create systemd service for Accumulator App
  copy:
    dest: /etc/systemd/system/cpe-app.service
    mode: "0644"
    content: |
      [Unit]
      Description=Accumulator Load Service
      After=network.target

      [Service]
      User=ec2-user
      WorkingDirectory=/opt/cpe-app
      ExecStart=/usr/bin/java -jar /opt/cpe-app/AccumulatorLoad-1.0.0.jar \
        --spring.config.additional-location=/opt/cpe-app/db.properties
      Restart=always
      RestartSec=5
      Environment=JAVA_OPTS="-Xms512m -Xmx1024m"

      [Install]
      WantedBy=multi-user.target

# ============================================================
# Reload systemd and enable service
# ============================================================
- name: Reload systemd daemon
  command: systemctl daemon-reload

- name: Enable service on boot
  systemd:
    name: cpe-app
    enabled: yes

- name: Restart Accumulator service
  systemd:
    name: cpe-app
    state: restarted
