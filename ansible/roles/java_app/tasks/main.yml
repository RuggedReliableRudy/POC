---
- name: Create app directory
  file:
    path: /opt/cpe-app
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy JAR from CI artifact location
  copy:
    src: "{{ jar_name }}"
    dest: "/opt/cpe-app/{{ jar_name }}"
    mode: "0755"

- name: Create systemd service
  copy:
    dest: /etc/systemd/system/cpe-app.service
    content: |
      [Unit]
      Description=CPE App
      After=network.target

      [Service]
      User=ec2-user
      WorkingDirectory=/opt/cpe-app
      ExecStart=/usr/bin/java -jar /opt/cpe-app/{{ jar_name }}
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start app
  systemd:
    name: cpe-app
    enabled: yes
    state: started
