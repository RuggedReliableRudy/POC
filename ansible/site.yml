---
- name: Deploy Accumulator Application
  hosts: all
  become: yes
  gather_facts: false

  collections:
    - amazon.aws

  vars:
    ansible_connection: aws_ssm
    ansible_user: ssm-user
    ansible_python_interpreter: /usr/bin/python3

    db_endpoint_1: "{{ lookup('env', 'DB_ENDPOINT_1') }}"
    db_endpoint_2: "{{ lookup('env', 'DB_ENDPOINT_2') }}"
    db_name: "{{ lookup('env', 'DB_NAME') }}"
    db_port: "{{ lookup('env', 'DB_PORT') }}"

  pre_tasks:
    - name: Ensure Python is installed
      raw: |
        if command -v python3 >/dev/null 2>&1; then
          echo "Python3 already installed"
        else
          sudo yum install -y python3 || sudo dnf install -y python3 || sudo apt-get install -y python3
        fi

    - name: Gather facts
      setup:

  tasks:
    - name: Ensure deployment directory exists
      file:
        path: /opt/accumulator
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy JAR to server
      copy:
        src: accumulator-*.jar
        dest: /opt/accumulator/accumulator.jar
        mode: '0755'

    - name: Template DB config
      template:
        src: templates/db_active.j2
        dest: /opt/accumulator/db_active.conf
        mode: '0644'

    - name: Restart accumulator service
      systemd:
        name: accumulator
        state: restarted
        enabled: yes
